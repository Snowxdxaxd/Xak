services:
  db:
    image: postgres:16-alpine
    container_name: codekids-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codekids
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codekids"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: codekids-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/codekids
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    ports:
      - "4000:4000"

volumes:
  postgres_data:
